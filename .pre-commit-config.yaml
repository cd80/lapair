repos:
-   repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v12.0.1
    hooks:
    -   id: clang-format
        args: [--style=file]

-   repo: local
    hooks:
    -   id: clang-tidy
        name: clang-tidy
        entry: /opt/homebrew/opt/llvm/bin/clang-tidy
        language: system
        files: \.cpp$
        types: [c, c++]

-   repo: https://github.com/pre-commit/mirrors-pylint
    rev: v2.7.4
    hooks:
    -   id: pylint

-   repo: https://github.com/pycqa/flake8
    rev: 3.9.2
    hooks:
    -   id: flake8
